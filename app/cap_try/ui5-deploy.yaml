# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json
# Build configuration for Cloud Foundry / HTML5 App Repository deployment.
# Excludes local test assets so they are not shipped to the repo.
specVersion: "3.1"
metadata:
  name: cap_try
type: application
builder:
  customTasks:
    # Zip the build output so the MTA com.sap.application.content deployer can
    # pick up `shopcartcap_try.zip` (must match the artifact name in mta.yaml).
    - name: ui5-task-zipper
      afterTask: generateComponentPreload
      configuration:
        archiveName: shopcartcap_try
        keepResources: true
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
