<!DOCTYPE html>
<html>
<head>
  <title>QUnit test suite for cap_try</title>
  <meta charset="utf-8">
  <script
    id="sap-ui-bootstrap"
    src="../resources/sap-ui-core.js"
    data-sap-ui-resource-roots='{ "cap_try": "../" }'
    data-sap-ui-compat-version="edge"
    data-sap-ui-async="true"></script>
  <link rel="stylesheet" href="../resources/sap/ui/thirdparty/qunit-2.css" type="text/css" media="screen" />
  <script src="../resources/sap/ui/thirdparty/qunit-2.js"></script>
  <script src="../resources/sap/ui/qunit/qunit-junit.js"></script>
  <script>
    QUnit.config.autostart = false;
    sap.ui.require([
      "cap_try/test/unit/AllTests.qunit"

      QUnit.start();
    });
  </script>
</head>
<body>
  <div id="qunit"></div>

</body>
</html>
